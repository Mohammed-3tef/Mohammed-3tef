name: Programming Books I've Read

on:
  schedule:
    - cron: "0 0,3,6,9,12,15,18,21 * * *"
  workflow_dispatch:

jobs:
  update-readme-with-goodreads-books:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Goodreads Profile Workflow
        uses: zwacky/goodreads-profile-workflow@v1.2.4

        with:
          goodreads_user_id: "121646211"
          shelf: "programming"
          max_books_count: 10
          readme_file_path: "./README.md"
          output_only: false
          comment_tag_name: "GOODREADS-LIST"
          template: "- [$title]($url) by $author"
          sort_by_fields: ">pubDate"
