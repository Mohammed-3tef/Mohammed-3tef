name: Programming Books I've Read

permissions:
  contents: write
  actions: read

concurrency:
  group: goodreads-update
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update-readme-with-goodreads-books:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          if [ -z "${{ secrets.GOODREADS_USER_ID }}" ]; then
            echo "Missing GOODREADS_USER_ID"
            exit 1
          fi

      - name: Show README safely
        run: |
          if [ -f README.md ]; then
            cat README.md
          else
            echo "README.md not found"
          fi

      - name: Update Goodreads profile
        uses: lancefrench/goodreads-profile-workflow@c23d5d95bc54f7b983c6d879e1134d61429edbc7
        with:
          goodreads_user_id: "${{ secrets.GOODREADS_USER_ID }}"
          shelf: "programming"
          max_books_count: 5
          template: "- [$title]($url) by $author"

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add README.md

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Update Goodreads books"
          git push
