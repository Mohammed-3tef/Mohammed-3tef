name: Programmig Books I've Read

# Explicitly set permissions to minimum required
permissions:
  contents: write  # Needed to update README
  actions: read    # Needed to read workflow

# Prevent concurrent runs that could conflict
concurrency:
  group: goodreads-update
  cancel-in-progress: true
  
on:
  schedule: # Run workflow automatically
    # This will make it run every hour
    - cron: "0 * * * *"
    # Run workflow manually (without waiting for the cron to be called), through the Github Actions Workflow page directly
  workflow_dispatch:
jobs:
  update-readme-with-goodreads-books:
    name: Update README with my programming books
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Prevent runaway processes
    steps:
      - name: Debug shelf
        run: echo "Shelf = programming, User = ${{ secrets.GOODREADS_USER_ID }}"

      - name: Show README before update
        run: cat README.md
    
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          # Use a token with limited scope if possible
          token: ${{ github.token }}
          
      - name: Validate inputs
        run: |
          if [ -z "${{ secrets.GOODREADS_USER_ID }}" ]; then
            echo "Error: GOODREADS_USER_ID secret is not set"
            exit 1
          fi
          
      - name: Update Goodreads profile
        uses: lancefrench/goodreads-profile-workflow@c23d5d95bc54f7b983c6d879e1134d61429edbc7
        with:
          # Replace this with your goodreads user id
          goodreads_user_id: "${{ secrets.GOODREADS_USER_ID }}"
          max_books_count: 5
          shelf: "programming"
          output_only: true
          template: "- [$title]($url) by $author"

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add README.md
          git commit -am "Update Goodreads books" || git commit --allow-empty -m "Force update"
          git push
